<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商务风指针时钟与日历</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 QRCode.js 库用于生成二维码 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body {
            background-color: #f1f5f9;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }
        .clock-hand {
            transform-origin: 50% 100%;
            border-radius: 9999px;
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform: translateX(-50%);
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 25px -5px rgba(15, 23, 42, 0.1), 0 8px 10px -6px rgba(15, 23, 42, 0.05);
        }
        #qrcode img {
            margin: 0 auto;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 text-slate-800">

    <!-- 主容器 -->
    <div class="glass-panel rounded-2xl p-8 max-w-4xl w-full flex flex-col md:flex-row gap-10 border border-slate-200">
        
        <!-- 左侧：时钟 -->
        <div class="flex-1 flex flex-col items-center justify-center border-b md:border-b-0 md:border-r border-slate-200 pb-8 md:pb-0 md:pr-10">
            <h2 class="text-2xl font-semibold text-slate-800 tracking-wide mb-6">本地时间</h2>
            
            <div id="clock-face" class="relative w-64 h-64 rounded-full bg-white shadow-inner flex items-center justify-center border-[6px] border-slate-800 mb-8">
                <div id="hour-hand" class="clock-hand bg-slate-800 w-2 h-16 z-20"></div>
                <div id="minute-hand" class="clock-hand bg-slate-600 w-1.5 h-24 z-30"></div>
                <div id="second-hand" class="clock-hand bg-red-600 w-0.5 h-26 z-40" style="height: 6.5rem;"></div>
                <div class="absolute w-4 h-4 bg-slate-800 rounded-full z-50 border-2 border-red-600"></div>
            </div>

            <div class="text-center">
                <div id="digital-time" class="text-4xl font-bold text-slate-900 tracking-tight font-mono mb-2">00:00:00</div>
                <div id="digital-date" class="text-sm font-medium text-slate-500 uppercase tracking-widest">加载中...</div>
            </div>
        </div>

        <!-- 右侧：日历 -->
        <div class="flex-1 flex flex-col justify-center">
            <div class="flex items-center justify-between mb-6">
                <h2 id="calendar-title" class="text-xl font-bold text-slate-800">2024年 1月</h2>
                <div class="flex gap-2">
                    <button id="prev-month" class="p-2 rounded-lg hover:bg-slate-100 text-slate-600 transition-colors border border-transparent hover:border-slate-200">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                    </button>
                    <button id="today-btn" class="px-3 py-1.5 text-sm font-medium rounded-lg bg-slate-100 hover:bg-slate-200 text-slate-700 transition-colors">回到今日</button>
                    <button id="next-month" class="p-2 rounded-lg hover:bg-slate-100 text-slate-600 transition-colors border border-transparent hover:border-slate-200">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                    </button>
                </div>
            </div>

            <div class="grid grid-cols-7 gap-1 text-center mb-2">
                <div class="text-xs font-semibold text-slate-400 py-2">日</div>
                <div class="text-xs font-semibold text-slate-400 py-2">一</div>
                <div class="text-xs font-semibold text-slate-400 py-2">二</div>
                <div class="text-xs font-semibold text-slate-400 py-2">三</div>
                <div class="text-xs font-semibold text-slate-400 py-2">四</div>
                <div class="text-xs font-semibold text-slate-400 py-2">五</div>
                <div class="text-xs font-semibold text-slate-400 py-2">六</div>
            </div>
            <div id="calendar-grid" class="grid grid-cols-7 gap-1 text-center"></div>
        </div>
    </div>

    <!-- 二维码生成按钮 -->
    <div class="mt-8 text-center">
        <button id="generate-qr" class="px-6 py-2 bg-slate-800 text-white rounded-full hover:bg-slate-700 transition-all shadow-lg flex items-center gap-2 mx-auto">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"></path></svg>
            显示分享二维码
        </button>
        <p class="text-xs text-slate-400 mt-2">提示：二维码指向当前页面的访问地址</p>
    </div>

    <!-- 二维码弹窗 -->
    <div id="qr-modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-[100] backdrop-blur-sm p-4">
        <div class="bg-white p-8 rounded-2xl max-w-sm w-full text-center">
            <h3 class="text-xl font-bold mb-4">扫描二维码访问</h3>
            <div id="qrcode" class="mb-6 flex justify-center border p-2 bg-white"></div>
            <button id="close-modal" class="w-full py-2 bg-slate-100 hover:bg-slate-200 rounded-xl font-medium transition-colors">关闭</button>
        </div>
    </div>

    <script>
        // 时钟逻辑
        const hourHand = document.getElementById('hour-hand');
        const minuteHand = document.getElementById('minute-hand');
        const secondHand = document.getElementById('second-hand');
        const digitalTime = document.getElementById('digital-time');
        const digitalDate = document.getElementById('digital-date');
        const clockFace = document.getElementById('clock-face');

        function generateClockTicks() {
            for (let i = 0; i < 60; i++) {
                const tick = document.createElement('div');
                const isHour = i % 5 === 0;
                tick.className = `absolute bg-slate-400 rounded-full ${isHour ? 'w-1.5 h-4 bg-slate-700' : 'w-0.5 h-2'}`;
                tick.style.transform = `rotate(${i * 6}deg) translateY(-105px)`;
                clockFace.appendChild(tick);
            }
        }
        generateClockTicks();

        function updateClock() {
            const now = new Date();
            const seconds = now.getSeconds();
            const minutes = now.getMinutes();
            const hours = now.getHours();
            
            secondHand.style.transform = `translateX(-50%) rotate(${seconds * 6}deg)`;
            minuteHand.style.transform = `translateX(-50%) rotate(${(minutes * 6) + (seconds * 0.1)}deg)`;
            hourHand.style.transform = `translateX(-50%) rotate(${((hours % 12) * 30) + (minutes * 0.5)}deg)`;

            digitalTime.textContent = now.toTimeString().split(' ')[0];
            digitalDate.textContent = now.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 日历逻辑
        let currentMonth = new Date().getMonth();
        let currentYear = new Date().getFullYear();
        const calendarGrid = document.getElementById('calendar-grid');
        const calendarTitle = document.getElementById('calendar-title');

        function renderCalendar(month, year) {
            calendarGrid.innerHTML = '';
            calendarTitle.textContent = `${year}年 ${month + 1}月`;
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const daysInPrevMonth = new Date(year, month, 0).getDate();
            const today = new Date();

            for (let i = firstDay; i > 0; i--) {
                const d = document.createElement('div');
                d.className = 'py-2 text-sm text-slate-300';
                d.textContent = daysInPrevMonth - i + 1;
                calendarGrid.appendChild(d);
            }
            for (let i = 1; i <= daysInMonth; i++) {
                const d = document.createElement('div');
                d.textContent = i;
                const isToday = today.getDate() === i && today.getMonth() === month && today.getFullYear() === year;
                d.className = `py-2 text-sm rounded-lg cursor-pointer ${isToday ? 'bg-blue-600 text-white font-bold shadow-md' : 'text-slate-700 hover:bg-slate-100'}`;
                calendarGrid.appendChild(d);
            }
            renderCalendarFill(firstDay + daysInMonth);
        }

        function renderCalendarFill(count) {
            for (let i = 1; i <= (42 - count); i++) {
                const d = document.createElement('div');
                d.className = 'py-2 text-sm text-slate-300';
                d.textContent = i;
                calendarGrid.appendChild(d);
            }
        }

        document.getElementById('prev-month').onclick = () => { currentMonth--; if(currentMonth<0){currentMonth=11;currentYear--;} renderCalendar(currentMonth, currentYear); };
        document.getElementById('next-month').onclick = () => { currentMonth++; if(currentMonth>11){currentMonth=0;currentYear++;} renderCalendar(currentMonth, currentYear); };
        document.getElementById('today-btn').onclick = () => { const n=new Date(); currentMonth=n.getMonth(); currentYear=n.getFullYear(); renderCalendar(currentMonth, currentYear); };
        renderCalendar(currentMonth, currentYear);

        // ==========================================
        // 二维码逻辑
        // ==========================================
        const modal = document.getElementById('qr-modal');
        const qrContainer = document.getElementById('qrcode');
        let qrcodeInstance = null;

        document.getElementById('generate-qr').onclick = () => {
            const currentUrl = window.location.href;
            
            qrContainer.innerHTML = ''; // 清空旧的
            qrcodeInstance = new QRCode(qrContainer, {
                text: currentUrl,
                width: 200,
                height: 200,
                colorDark : "#0f172a",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });

            modal.classList.remove('hidden');
            modal.classList.add('flex');
        };

        document.getElementById('close-modal').onclick = () => {
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        };
    </script>
</body>
</html>
