<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网址导航 - Quick Links</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1f2e 0%, #2d3748 50%, #1a202c 100%);
            color: #e2e8f0;
            padding: 30px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* 头部 */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 36px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .header .subtitle {
            font-size: 14px;
            color: #a0aec0;
        }

        /* 搜索框 */
        .search-box {
            max-width: 600px;
            margin: 30px auto;
            display: flex;
            gap: 10px;
        }

        .search-box input {
            flex: 1;
            padding: 14px 20px;
            border: none;
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-box input::placeholder {
            color: #718096;
        }

        .search-box input:focus {
            background: rgba(255,255,255,0.15);
            box-shadow: 0 0 20px rgba(66, 153, 225, 0.3);
        }

        .search-box button {
            padding: 14px 30px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #3182ce, #2b6cb0);
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .search-box button:hover {
            background: linear-gradient(135deg, #4299e1, #3182ce);
            transform: translateY(-2px);
        }

        /* 分类区块 */
        .section {
            margin-bottom: 35px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: #a0aec0;
            margin-bottom: 15px;
            padding-left: 15px;
            border-left: 4px solid #3182ce;
        }

        /* 链接网格 */
        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
        }

        .link-card {
            background: linear-gradient(145deg, rgba(45, 55, 72, 0.8), rgba(26, 32, 44, 0.9));
            border-radius: 12px;
            padding: 20px 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.05);
            text-decoration: none;
            display: block;
        }

        .link-card:hover {
            transform: translateY(-5px);
            background: linear-gradient(145deg, rgba(49, 130, 206, 0.3), rgba(45, 55, 72, 0.9));
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border-color: rgba(66, 153, 225, 0.3);
        }

        .link-card .icon {
            width: 50px;
            height: 50px;
            margin: 0 auto 12px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            background: linear-gradient(135deg, rgba(66, 153, 225, 0.2), rgba(49, 130, 206, 0.1));
        }

        .link-card .icon img {
            width: 32px;
            height: 32px;
            border-radius: 6px;
        }

        .link-card .title {
            font-size: 14px;
            color: #e2e8f0;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .link-card .desc {
            font-size: 11px;
            color: #718096;
            margin-top: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 本地工具特殊样式 */
        .link-card.local {
            background: linear-gradient(145deg, rgba(72, 187, 120, 0.15), rgba(26, 32, 44, 0.9));
            border-color: rgba(72, 187, 120, 0.2);
        }

        .link-card.local:hover {
            background: linear-gradient(145deg, rgba(72, 187, 120, 0.3), rgba(45, 55, 72, 0.9));
            border-color: rgba(72, 187, 120, 0.4);
        }

        .link-card.local .icon {
            background: linear-gradient(135deg, rgba(72, 187, 120, 0.3), rgba(56, 161, 105, 0.2));
        }

        /* 颜色变体 */
        .link-card.red .icon { background: linear-gradient(135deg, rgba(229, 62, 62, 0.3), rgba(197, 48, 48, 0.2)); }
        .link-card.orange .icon { background: linear-gradient(135deg, rgba(237, 137, 54, 0.3), rgba(221, 107, 32, 0.2)); }
        .link-card.yellow .icon { background: linear-gradient(135deg, rgba(236, 201, 75, 0.3), rgba(214, 158, 46, 0.2)); }
        .link-card.green .icon { background: linear-gradient(135deg, rgba(72, 187, 120, 0.3), rgba(56, 161, 105, 0.2)); }
        .link-card.teal .icon { background: linear-gradient(135deg, rgba(56, 178, 172, 0.3), rgba(49, 151, 149, 0.2)); }
        .link-card.blue .icon { background: linear-gradient(135deg, rgba(66, 153, 225, 0.3), rgba(49, 130, 206, 0.2)); }
        .link-card.indigo .icon { background: linear-gradient(135deg, rgba(102, 126, 234, 0.3), rgba(85, 60, 218, 0.2)); }
        .link-card.purple .icon { background: linear-gradient(135deg, rgba(159, 122, 234, 0.3), rgba(128, 90, 213, 0.2)); }
        .link-card.pink .icon { background: linear-gradient(135deg, rgba(237, 100, 166, 0.3), rgba(214, 51, 132, 0.2)); }

        /* 时间显示 */
        .time-display {
            position: fixed;
            top: 20px;
            right: 30px;
            text-align: right;
            z-index: 100;
        }

        .time-display .time {
            font-size: 28px;
            font-weight: 300;
            color: #fff;
        }

        .time-display .date {
            font-size: 12px;
            color: #a0aec0;
            margin-top: 2px;
        }

        /* 页脚 */
        .footer {
            text-align: center;
            padding: 30px 0;
            margin-top: 40px;
            border-top: 1px solid rgba(255,255,255,0.1);
            color: #718096;
            font-size: 12px;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .links-grid {
                grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
                gap: 10px;
            }

            .link-card {
                padding: 15px 10px;
            }

            .link-card .icon {
                width: 40px;
                height: 40px;
                font-size: 20px;
            }

            .time-display {
                position: static;
                text-align: center;
                margin-bottom: 20px;
            }

            .search-box {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="time-display">
        <div class="time" id="time">00:00:00</div>
        <div class="date" id="date">加载中...</div>
    </div>

    <div class="container">
        <div class="header">
            <h1>网址导航</h1>
            <div class="subtitle">Quick Links Dashboard</div>
        </div>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="搜索或输入网址..." onkeypress="handleSearch(event)">
            <button onclick="doSearch()">搜索</button>
        </div>

        <!-- 本地工具 -->
        <div class="section">
            <div class="section-title">本地工具</div>
            <div class="links-grid" id="localTools"></div>
        </div>

        <!-- 常用网站 -->
        <div class="section">
            <div class="section-title">常用网站</div>
            <div class="links-grid" id="commonSites"></div>
        </div>

        <!-- 开发工具 -->
        <div class="section">
            <div class="section-title">开发工具</div>
            <div class="links-grid" id="devTools"></div>
        </div>

        <!-- 搜索引擎 -->
        <div class="section">
            <div class="section-title">搜索引擎</div>
            <div class="links-grid" id="searchEngines"></div>
        </div>

        <!-- 社交媒体 -->
        <div class="section">
            <div class="section-title">社交媒体</div>
            <div class="links-grid" id="socialMedia"></div>
        </div>

        <!-- 影音娱乐 -->
        <div class="section">
            <div class="section-title">影音娱乐</div>
            <div class="links-grid" id="entertainment"></div>
        </div>

        <!-- 学习资源 -->
        <div class="section">
            <div class="section-title">学习资源</div>
            <div class="links-grid" id="learning"></div>
        </div>

        <div class="footer">
            <p>按 Ctrl+K 快速搜索 · 点击图标跳转</p>
        </div>
    </div>

    <script>
        // 本地HTML工具
        const localTools = [
            { name: '系统监控', icon: '🕐', url: 'clock.html', desc: '时钟与系统信息', color: 'local' }
        ];

        // 常用网站
        const commonSites = [
            { name: 'Google', icon: '🔍', url: 'https://www.google.com', desc: '搜索引擎' },
            { name: '百度', icon: '🔵', url: 'https://www.baidu.com', desc: '中文搜索' },
            { name: 'GitHub', icon: '🐙', url: 'https://github.com', desc: '代码托管' },
            { name: '知乎', icon: '💬', url: 'https://www.zhihu.com', desc: '问答社区' },
            { name: '微博', icon: '📱', url: 'https://weibo.com', desc: '社交平台' },
            { name: '淘宝', icon: '🛒', url: 'https://www.taobao.com', desc: '网购平台' },
            { name: '京东', icon: '📦', url: 'https://www.jd.com', desc: '电商平台' },
            { name: '哔哩哔哩', icon: '📺', url: 'https://www.bilibili.com', desc: '视频平台' }
        ];

        // 开发工具
        const devTools = [
            { name: 'Stack Overflow', icon: '📚', url: 'https://stackoverflow.com', desc: '技术问答' },
            { name: 'MDN', icon: '📖', url: 'https://developer.mozilla.org', desc: 'Web文档' },
            { name: 'CodePen', icon: '✏️', url: 'https://codepen.io', desc: '在线代码' },
            { name: 'JSFiddle', icon: '🎻', url: 'https://jsfiddle.net', desc: '代码演示' },
            { name: 'npm', icon: '📦', url: 'https://www.npmjs.com', desc: '包管理器' },
            { name: 'Can I Use', icon: '✅', url: 'https://caniuse.com', desc: '兼容性查询' },
            { name: 'Regex101', icon: '🔍', url: 'https://regex101.com', desc: '正则测试' },
            { name: 'JSON Editor', icon: '📄', url: 'https://jsoneditoronline.org', desc: 'JSON编辑' },
            { name: 'Postman', icon: '📮', url: 'https://www.postman.com', desc: 'API测试' },
            { name: 'Vercel', icon: '▲', url: 'https://vercel.com', desc: '部署平台' },
            { name: 'Netlify', icon: '🌐', url: 'https://www.netlify.com', desc: '静态托管' },
            { name: 'Docker Hub', icon: '🐳', url: 'https://hub.docker.com', desc: '容器镜像' }
        ];

        // 搜索引擎
        const searchEngines = [
            { name: 'Google', icon: '🔍', url: 'https://www.google.com', desc: '全球搜索' },
            { name: 'Bing', icon: '🅱️', url: 'https://www.bing.com', desc: '微软搜索' },
            { name: 'DuckDuckGo', icon: '🦆', url: 'https://duckduckgo.com', desc: '隐私搜索' },
            { name: '百度', icon: '🔵', url: 'https://www.baidu.com', desc: '中文搜索' },
            { name: '搜狗', icon: '🐕', url: 'https://www.sogou.com', desc: '搜索引擎' },
            { name: 'Yandex', icon: '🇷🇺', url: 'https://yandex.com', desc: '俄罗斯搜索' }
        ];

        // 社交媒体
        const socialMedia = [
            { name: 'Twitter/X', icon: '🐦', url: 'https://twitter.com', desc: '社交平台' },
            { name: 'Facebook', icon: '📘', url: 'https://www.facebook.com', desc: '社交网络' },
            { name: 'Instagram', icon: '📷', url: 'https://www.instagram.com', desc: '图片分享' },
            { name: 'LinkedIn', icon: '💼', url: 'https://www.linkedin.com', desc: '职场社交' },
            { name: 'Reddit', icon: '🤖', url: 'https://www.reddit.com', desc: '论坛社区' },
            { name: 'Discord', icon: '💬', url: 'https://discord.com', desc: '聊天社区' },
            { name: 'Telegram', icon: '✈️', url: 'https://web.telegram.org', desc: '即时通讯' },
            { name: '微信', icon: '💚', url: 'https://wx.qq.com', desc: '网页版微信' }
        ];

        // 影音娱乐
        const entertainment = [
            { name: 'YouTube', icon: '▶️', url: 'https://www.youtube.com', desc: '视频平台' },
            { name: 'Netflix', icon: '🎬', url: 'https://www.netflix.com', desc: '流媒体' },
            { name: 'Spotify', icon: '🎵', url: 'https://www.spotify.com', desc: '音乐平台' },
            { name: 'Twitch', icon: '🎮', url: 'https://www.twitch.tv', desc: '直播平台' },
            { name: '爱奇艺', icon: '📺', url: 'https://www.iqiyi.com', desc: '视频网站' },
            { name: '优酷', icon: '🎥', url: 'https://www.youku.com', desc: '视频平台' },
            { name: '腾讯视频', icon: '🎬', url: 'https://v.qq.com', desc: '视频网站' },
            { name: '网易云音乐', icon: '🎶', url: 'https://music.163.com', desc: '音乐平台' }
        ];

        // 学习资源
        const learning = [
            { name: 'Coursera', icon: '🎓', url: 'https://www.coursera.org', desc: '在线课程' },
            { name: 'Udemy', icon: '📚', url: 'https://www.udemy.com', desc: '技能学习' },
            { name: 'Khan Academy', icon: '🏫', url: 'https://www.khanacademy.org', desc: '免费课程' },
            { name: 'edX', icon: '📖', url: 'https://www.edx.org', desc: '大学课程' },
            { name: 'LeetCode', icon: '💻', url: 'https://leetcode.com', desc: '算法练习' },
            { name: 'freeCodeCamp', icon: '🔥', url: 'https://www.freecodecamp.org', desc: '编程学习' },
            { name: 'W3Schools', icon: '🌐', url: 'https://www.w3schools.com', desc: 'Web教程' },
            { name: '菜鸟教程', icon: '🐣', url: 'https://www.runoob.com', desc: '编程入门' }
        ];

        // 渲染链接
        function renderLinks(containerId, links) {
            const container = document.getElementById(containerId);
            const colors = ['red', 'orange', 'yellow', 'green', 'teal', 'blue', 'indigo', 'purple', 'pink'];

            links.forEach((link, index) => {
                const colorClass = link.color || colors[index % colors.length];
                const card = document.createElement('a');
                card.className = `link-card ${colorClass}`;
                card.href = link.url;
                card.target = link.url.startsWith('http') ? '_blank' : '_self';
                card.innerHTML = `
                    <div class="icon">${link.icon}</div>
                    <div class="title">${link.name}</div>
                    <div class="desc">${link.desc}</div>
                `;
                container.appendChild(card);
            });
        }

        // 时间显示
        function updateTime() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('zh-CN', { hour12: false });
            const dateStr = now.toLocaleDateString('zh-CN', {
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                weekday: 'long'
            });

            document.getElementById('time').textContent = timeStr;
            document.getElementById('date').textContent = dateStr;
        }

        // 搜索功能
        function doSearch() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) return;

            // 判断是否是URL
            if (query.includes('.') && !query.includes(' ')) {
                let url = query;
                if (!url.startsWith('http://') && !url.startsWith('https://')) {
                    url = 'https://' + url;
                }
                window.open(url, '_blank');
            } else {
                // 使用Google搜索
                window.open(`https://www.google.com/search?q=${encodeURIComponent(query)}`, '_blank');
            }
        }

        function handleSearch(e) {
            if (e.key === 'Enter') {
                doSearch();
            }
        }

        // 快捷键
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                e.preventDefault();
                document.getElementById('searchInput').focus();
            }
        });

        // 初始化
        renderLinks('localTools', localTools);
        renderLinks('commonSites', commonSites);
        renderLinks('devTools', devTools);
        renderLinks('searchEngines', searchEngines);
        renderLinks('socialMedia', socialMedia);
        renderLinks('entertainment', entertainment);
        renderLinks('learning', learning);

        updateTime();
        setInterval(updateTime, 1000);
    </script>
</body>
</html>
